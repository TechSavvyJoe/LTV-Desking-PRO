<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LTV Desking PRO — Automotive desking, lender matching, F&amp;I tooling</title>
    <meta name="description" content="LTV Desking PRO helps US dealerships structure deals, match lenders, and run F&I workflows — with AI-assisted rate-sheet extraction and integrated audit logging." />
    <!-- Per-scheme browser chrome tint — matches --color-bg-subtle (light) and
         --color-bg (dark) from index.css. -->
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f8fafc" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#05080b" />
    <meta name="color-scheme" content="dark light" />

    <!-- Theme bootstrap: set the <html> class before first paint to avoid a
         flash. Dark is the default surface for the redesign. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem("ltvTheme_v1");
          var dark = t !== "light"; // default dark unless explicitly "light"
          document.documentElement.classList.add(dark ? "dark" : "light");
        } catch (e) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>

    <!-- Favicon + manifest -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.svg" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="LTV Desking PRO" />
    <meta property="og:title" content="LTV Desking PRO — Automotive desking + F&amp;I" />
    <meta property="og:description" content="Structure deals, match lenders, and run F&I workflows for US dealerships. AI-assisted rate sheets, audit logging, multi-tenant by design." />
    <meta property="og:url" content="https://ltvdeskingpro.vercel.app/" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="LTV Desking PRO" />
    <meta name="twitter:description" content="Automotive desking, lender matching, F&I tooling for US dealerships." />

    <!-- Performance hints -->
    <link rel="preconnect" href="https://ltv-desking-pro-api.fly.dev" crossorigin />
    <link rel="dns-prefetch" href="https://o4510200651382784.ingest.us.sentry.io" />
    <style>
      /* Pre-React paint — kept in sync with index.css tokens to avoid a flash.
         Geist Sans loads via @fontsource; system-ui covers the gap. */
      body {
        font-family: "Geist Sans", system-ui, -apple-system, "Segoe UI", sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        font-size: 16px;
        transition: background-color 0.3s, color 0.3s;
      }
      /* Light — mirrors index.css :root tokens (--color-bg-subtle / --color-text) */
      body {
        background-color: #f8fafc;
        color: #0f172a;
      }
      /* Dark (default) — mirrors index.css .dark tokens (--color-bg / --color-text) */
      .dark body {
        background-color: #05080b;
        color: #f5f7f8;
      }
      /* Custom scrollbar */
      ::-webkit-scrollbar {
        width: 10px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background-color: rgba(20, 22, 28, 0.25);
        border-radius: 8px;
        border: 3px solid transparent;
        background-clip: content-box;
      }
      .dark ::-webkit-scrollbar-thumb {
        background-color: rgba(255, 255, 255, 0.18);
      }
    </style>
    <link rel="stylesheet" href="/index.css">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
