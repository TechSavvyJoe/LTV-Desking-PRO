name: Set Fly secrets

# One-shot workflow that pushes the LITESTREAM_* values from GitHub Actions
# secrets into Fly machine secrets, then restarts the app so they take effect.
#
# Trigger this manually after rotating R2 credentials, or after the initial
# R2 bucket setup. The four GH secrets read by this job must exist:
#   LITESTREAM_BUCKET, LITESTREAM_ENDPOINT,
#   LITESTREAM_ACCESS_KEY_ID, LITESTREAM_SECRET_ACCESS_KEY
#
# Why a workflow and not local flyctl? The local CLI has been hitting a
# third-party-discharge-token error; the GH Actions FLY_API_TOKEN works
# reliably, so this routes secret-setting through CI like deploys do.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  set-secrets:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1

      - name: Push LITESTREAM_* secrets to Fly
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          LITESTREAM_BUCKET: ${{ secrets.LITESTREAM_BUCKET }}
          LITESTREAM_ENDPOINT: ${{ secrets.LITESTREAM_ENDPOINT }}
          LITESTREAM_ACCESS_KEY_ID: ${{ secrets.LITESTREAM_ACCESS_KEY_ID }}
          LITESTREAM_SECRET_ACCESS_KEY: ${{ secrets.LITESTREAM_SECRET_ACCESS_KEY }}
        run: |
          if [ -z "$LITESTREAM_BUCKET" ] || [ -z "$LITESTREAM_ENDPOINT" ] || \
             [ -z "$LITESTREAM_ACCESS_KEY_ID" ] || [ -z "$LITESTREAM_SECRET_ACCESS_KEY" ]; then
            echo "::error::One or more LITESTREAM_* GH secrets are unset. Set them via 'gh secret set' before running this workflow."
            exit 1
          fi
          # Set all four in a single flyctl call so the machine restarts once
          flyctl secrets set \
            --app ltv-desking-pro-api \
            LITESTREAM_BUCKET="$LITESTREAM_BUCKET" \
            LITESTREAM_ENDPOINT="$LITESTREAM_ENDPOINT" \
            LITESTREAM_ACCESS_KEY_ID="$LITESTREAM_ACCESS_KEY_ID" \
            LITESTREAM_SECRET_ACCESS_KEY="$LITESTREAM_SECRET_ACCESS_KEY"

      - name: Verify Litestream is replicating
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          # Give the machine 30s to restart with the new secrets
          sleep 30
          # Pull the last 50 log lines and grep for the Litestream startup banner
          flyctl logs --app ltv-desking-pro-api --no-tail 2>&1 | tail -80 | \
            grep -E "Booting PocketBase under Litestream replication|replicating to" || \
            { echo "::warning::Couldn't see Litestream startup banner in recent logs. Check 'fly logs' manually."; exit 0; }
