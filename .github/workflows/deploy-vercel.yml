name: Deploy Frontend to Vercel

on:
  push:
    branches: [main]
    paths-ignore:
      - "backend/**"
  workflow_dispatch:

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel Environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          # Sentry DSN baked into the production bundle. Empty in env =
          # lib/sentry.ts no-ops gracefully, which is fine for previews
          # / local dev.
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          # Surfaced to Sentry as `release` for source-map matching
          VITE_RELEASE: ${{ github.sha }}
          # Backend URL baked into the bundle. The Vercel project env was
          # never actually set (masked for months by the old silent
          # fallback to the Fly URL) — pin it here so CI builds are
          # deterministic. Not a secret; override via repo variable if
          # the backend ever moves.
          VITE_POCKETBASE_URL: ${{ vars.VITE_POCKETBASE_URL || 'https://ltv-desking-pro-api.fly.dev' }}

      - name: Deploy to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
