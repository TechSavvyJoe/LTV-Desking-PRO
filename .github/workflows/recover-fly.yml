name: Recover Fly (unset Litestream secrets)

# Emergency recovery workflow. Plain PocketBase is fail-closed by default, so
# this explicitly stages removal of the broken LITESTREAM_* settings and then
# enables the ALLOW_NO_BACKUP bypass. Use only when a Litestream failure is
# keeping the API unhealthy; re-run "Set Fly secrets" as soon as R2 is repaired.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  recover:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1

      - name: Enter explicit no-backup recovery mode
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          # Stage the unsets so only the final set command restarts the machine.
          flyctl secrets unset \
            --app ltv-desking-pro-api \
            --stage \
            LITESTREAM_BUCKET \
            LITESTREAM_ENDPOINT \
            LITESTREAM_ACCESS_KEY_ID \
            LITESTREAM_SECRET_ACCESS_KEY
          flyctl secrets set \
            --app ltv-desking-pro-api \
            --detach \
            ALLOW_NO_BACKUP=1
          echo "Emergency bypass enabled. PocketBase will run without R2 replication."
          echo "Repair R2 and run 'Set Fly secrets' immediately; that workflow resets the bypass."
