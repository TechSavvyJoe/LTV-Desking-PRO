name: Recover Fly (unset Litestream secrets)

# Emergency recovery workflow. Removes the LITESTREAM_* secrets from the Fly
# app so start.sh falls back to plain PocketBase on the next restart. Use this
# if a Litestream wrapper bug is keeping the machine unhealthy.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  recover:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1

      - name: Unset LITESTREAM_* secrets (forces fallback path)
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          # --detach avoids the GH job hanging on machine restart.
          flyctl secrets unset \
            --app ltv-desking-pro-api \
            --detach \
            LITESTREAM_BUCKET \
            LITESTREAM_ENDPOINT \
            LITESTREAM_ACCESS_KEY_ID \
            LITESTREAM_SECRET_ACCESS_KEY
          echo "Secrets unset. Machine should restart and run plain PocketBase within ~60s."
