name: Fly diagnostics

# One-shot workflow that grabs the most recent Fly logs and uploads them
# as a workflow artifact. Use when investigating a crash or unhealthy state.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diag:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1

      - name: Capture control-plane and backup state
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          set -euo pipefail
          {
            flyctl status --app ltv-desking-pro-api
            flyctl machine list --app ltv-desking-pro-api
            flyctl volumes list --app ltv-desking-pro-api
            flyctl secrets list --app ltv-desking-pro-api
          } | tee fly-state.txt

          VOLUME_ID=$(flyctl volumes list --app ltv-desking-pro-api --json \
            | jq -r '.[] | select((.name // .Name) == "ltv_desking_data") | (.id // .ID)' \
            | head -1)
          if [ -n "$VOLUME_ID" ] && [ "$VOLUME_ID" != "null" ]; then
            flyctl volumes snapshots list "$VOLUME_ID" --app ltv-desking-pro-api \
              | tee -a fly-state.txt
          fi

      - name: Pull last 500 log lines
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          flyctl logs --app ltv-desking-pro-api --no-tail 2>&1 | tail -500 > fly-logs.txt
          echo "---"
          echo "Captured $(wc -l < fly-logs.txt) lines."
          echo "---"
          tail -120 fly-logs.txt

      - name: Upload as artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: fly-logs
          path: |
            fly-logs.txt
            fly-state.txt
          retention-days: 7
