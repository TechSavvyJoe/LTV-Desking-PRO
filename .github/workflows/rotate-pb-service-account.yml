name: Rotate PocketBase Service Account

on:
  workflow_dispatch:

permissions:
  actions: read
  contents: read

concurrency:
  group: production-release
  cancel-in-progress: false

env:
  FLY_APP: ltv-desking-pro-api
  PB_BASE_URL: https://ltv-desking-pro-api.fly.dev
  PB_SERVICE_COLLECTION: api_service_accounts
  PB_SERVICE_SCOPE: ai_proxy
  VERCEL_CLI_VERSION: 55.0.0
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  PRODUCTION_URL: ${{ vars.VERCEL_PRODUCTION_URL || 'https://ltvdeskingpro.vercel.app' }}

jobs:
  rotate:
    name: Stage, verify, promote, and retire
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: main

      - name: Validate release and platform credentials
        env:
          GH_TOKEN: ${{ github.token }}
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          if [ "$GITHUB_REF" != "refs/heads/main" ]; then
            echo "::error::Run service-account rotation from the main workflow definition."
            exit 1
          fi
          for name in FLY_API_TOKEN VERCEL_TOKEN VERCEL_ORG_ID VERCEL_PROJECT_ID PRODUCTION_URL; do
            if [ -z "${!name:-}" ]; then
              echo "::error::$name is not configured."
              exit 1
            fi
          done

          MAIN_SHA=$(gh api "repos/$GITHUB_REPOSITORY/git/ref/heads/main" --jq '.object.sha')
          RUNS=$(gh api --method GET \
            "repos/$GITHUB_REPOSITORY/actions/workflows/check.yml/runs" \
            -f branch=main \
            -f head_sha="$MAIN_SHA" \
            -f status=success \
            -f per_page=20)
          VERIFIED_RUN_ID=$(printf '%s' "$RUNS" | jq -r --arg sha "$MAIN_SHA" '
            [.workflow_runs[]
              | select(.event == "push" and .head_sha == $sha and .conclusion == "success")]
            | first
            | .id // empty
          ')
          if [ -z "$VERIFIED_RUN_ID" ]; then
            echo "::error::Current main ($MAIN_SHA) has no successful Verification run."
            exit 1
          fi
          echo "RELEASE_SHA=$MAIN_SHA" >> "$GITHUB_ENV"

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24"

      - name: Install pinned Vercel CLI
        run: |
          set -euo pipefail
          npm install --global "vercel@${VERCEL_CLI_VERSION}"
          vercel --version

      - uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1

      - name: Generate one-time rotation credentials
        run: |
          set -euo pipefail
          umask 077
          NEW_SERVICE_EMAIL="ai-proxy-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}@service.invalid"
          NEW_SERVICE_PASSWORD="Aa1$(openssl rand -hex 30)"
          BOOTSTRAP_EMAIL="bootstrap-rotation-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}@service.invalid"
          BOOTSTRAP_PASSWORD="Aa1$(openssl rand -hex 30)"
          for value in "$NEW_SERVICE_EMAIL" "$NEW_SERVICE_PASSWORD" "$BOOTSTRAP_EMAIL" "$BOOTSTRAP_PASSWORD"; do
            echo "::add-mask::$value"
          done
          printf '%s' "$BOOTSTRAP_EMAIL" > /tmp/pb-bootstrap-email
          printf '%s' "$BOOTSTRAP_PASSWORD" > /tmp/pb-bootstrap-password
          {
            echo "NEW_SERVICE_EMAIL=$NEW_SERVICE_EMAIL"
            echo "NEW_SERVICE_PASSWORD=$NEW_SERVICE_PASSWORD"
          } >> "$GITHUB_ENV"

      - name: Create temporary bootstrap superuser
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          set -euo pipefail
          BOOTSTRAP_EMAIL=$(cat /tmp/pb-bootstrap-email)
          BOOTSTRAP_PASSWORD=$(cat /tmp/pb-bootstrap-password)
          : > /tmp/pb-bootstrap-attempted
          flyctl ssh console --app "$FLY_APP" --command \
            "/pb/pocketbase superuser upsert '$BOOTSTRAP_EMAIL' '$BOOTSTRAP_PASSWORD' --automigrate=false --dir=/pb/pb_data --hooksWatch=false"

      - name: Provision and prove the narrow service identity
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          set -euo pipefail
          umask 077
          BOOTSTRAP_EMAIL=$(cat /tmp/pb-bootstrap-email)
          BOOTSTRAP_PASSWORD=$(cat /tmp/pb-bootstrap-password)
          AUTH_BODY=$(jq -nc \
            --arg identity "$BOOTSTRAP_EMAIL" \
            --arg password "$BOOTSTRAP_PASSWORD" \
            '{identity:$identity,password:$password}')
          AUTH_RESPONSE=$(curl --retry 5 --retry-delay 2 --retry-all-errors \
            --connect-timeout 10 --max-time 30 --fail-with-body -sS \
            -H 'Content-Type: application/json' \
            --data "$AUTH_BODY" \
            "$PB_BASE_URL/api/collections/_superusers/auth-with-password")
          BOOTSTRAP_TOKEN=$(printf '%s' "$AUTH_RESPONSE" | jq -r '.token // empty')
          if [ -z "$BOOTSTRAP_TOKEN" ]; then
            echo "::error::Bootstrap authentication did not return a token."
            exit 1
          fi
          echo "::add-mask::$BOOTSTRAP_TOKEN"
          printf '%s' "$BOOTSTRAP_TOKEN" > /tmp/pb-bootstrap-token

          pb_get() {
            curl --retry 5 --retry-delay 2 --retry-all-errors \
              --connect-timeout 10 --max-time 30 --fail-with-body -sS \
              -H "Authorization: $BOOTSTRAP_TOKEN" "$1"
          }
          pb_write() {
            method=$1
            url=$2
            body=$3
            curl --connect-timeout 10 --max-time 30 --fail-with-body -sS \
              -X "$method" \
              -H "Authorization: $BOOTSTRAP_TOKEN" \
              -H 'Content-Type: application/json' \
              --data "$body" "$url"
          }

          AUTH_RULE='active = true && scope = "ai_proxy"'
          SERVICE_RULE='(@request.auth.collectionName = "api_service_accounts" && @request.auth.id != "" && @request.auth.active = true && @request.auth.scope = "ai_proxy")'
          COLLECTIONS=$(pb_get "$PB_BASE_URL/api/collections?perPage=500")
          SERVICE_COLLECTION=$(printf '%s' "$COLLECTIONS" | jq -c --arg name "$PB_SERVICE_COLLECTION" '
            [.items[] | select(.name == $name)] | first // empty
          ')
          if [ -z "$SERVICE_COLLECTION" ]; then
            echo "::error::$PB_SERVICE_COLLECTION is missing. Deploy the PocketBase authorization migration before rotation."
            exit 1
          fi

          printf '%s' "$SERVICE_COLLECTION" | jq -e --arg auth_rule "$AUTH_RULE" '
            .type == "auth" and
            .listRule == null and .viewRule == null and .createRule == null and
            .updateRule == null and .deleteRule == null and .manageRule == null and
            .authRule == $auth_rule and
            .passwordAuth.enabled == true and
            (.passwordAuth.identityFields | index("email") != null) and
            any(.fields[];
              .name == "active" and .type == "bool") and
            any(.fields[];
              .name == "scope" and .type == "text" and .required == true and
              .min >= 1 and .max <= 64) and
            any(.fields[];
              .name == "password" and .type == "password" and .min >= 12 and
              (.pattern | length) > 0)
          ' > /dev/null

          AI_KEYS_COLLECTION=$(printf '%s' "$COLLECTIONS" | jq -c '
            [.items[] | select(.name == "ai_provider_keys")] | first // empty
          ')
          if [ -z "$AI_KEYS_COLLECTION" ]; then
            echo "::error::ai_provider_keys is missing. Deploy the PocketBase authorization migration before rotation."
            exit 1
          fi
          printf '%s' "$AI_KEYS_COLLECTION" | jq -e --arg rule "$SERVICE_RULE" '
            .listRule == $rule and .viewRule == $rule and
            .createRule == $rule and .updateRule == $rule and .deleteRule == $rule
          ' > /dev/null

          OLD_ACCOUNTS=$(pb_get \
            "$PB_BASE_URL/api/collections/$PB_SERVICE_COLLECTION/records?page=1&perPage=200")
          printf '%s' "$OLD_ACCOUNTS" | jq -r --arg scope "$PB_SERVICE_SCOPE" '
            .items[] | select(.scope == $scope) | .id
          ' > /tmp/old-service-account-ids

          NEW_ACCOUNT_BODY=$(jq -nc \
            --arg email "$NEW_SERVICE_EMAIL" \
            --arg password "$NEW_SERVICE_PASSWORD" \
            --arg scope "$PB_SERVICE_SCOPE" \
            '{
              email:$email,
              password:$password,
              passwordConfirm:$password,
              verified:true,
              active:true,
              scope:$scope
            }')
          NEW_ACCOUNT=$(pb_write POST \
            "$PB_BASE_URL/api/collections/$PB_SERVICE_COLLECTION/records" \
            "$NEW_ACCOUNT_BODY")
          NEW_SERVICE_ID=$(printf '%s' "$NEW_ACCOUNT" | jq -r '.id // empty')
          if [ -z "$NEW_SERVICE_ID" ]; then
            echo "::error::Narrow service-account creation did not return a record ID."
            exit 1
          fi
          echo "NEW_SERVICE_ID=$NEW_SERVICE_ID" >> "$GITHUB_ENV"

          KEY_RECORDS=$(pb_get \
            "$PB_BASE_URL/api/collections/ai_provider_keys/records?page=1&perPage=1")
          printf '%s' "$KEY_RECORDS" | jq -c '
            (.items[0] // {}) as $record
            | [
                (if ($record.openaiApiKey // "") != "" then "openai" else empty end),
                (if ($record.anthropicApiKey // "") != "" then "anthropic" else empty end),
                (if ($record.geminiApiKey // "") != "" then "gemini" else empty end)
              ]
            | sort
          ' > /tmp/expected-configured-providers.json
          if [ "$(jq 'length' /tmp/expected-configured-providers.json)" -lt 1 ]; then
            echo "::error::At least one PB AI provider key is required for an end-to-end rotation proof."
            exit 1
          fi

          SERVICE_AUTH_BODY=$(jq -nc \
            --arg identity "$NEW_SERVICE_EMAIL" \
            --arg password "$NEW_SERVICE_PASSWORD" \
            '{identity:$identity,password:$password}')
          SERVICE_AUTH=$(curl --retry 5 --retry-delay 2 --retry-all-errors \
            --connect-timeout 10 --max-time 30 --fail-with-body -sS \
            -H 'Content-Type: application/json' \
            --data "$SERVICE_AUTH_BODY" \
            "$PB_BASE_URL/api/collections/$PB_SERVICE_COLLECTION/auth-with-password")
          SERVICE_TOKEN=$(printf '%s' "$SERVICE_AUTH" | jq -r '.token // empty')
          if [ -z "$SERVICE_TOKEN" ]; then
            echo "::error::Narrow service authentication did not return a token."
            exit 1
          fi
          echo "::add-mask::$SERVICE_TOKEN"
          curl --retry 5 --retry-delay 2 --retry-all-errors \
            --connect-timeout 10 --max-time 30 --fail-with-body -sS \
            -H "Authorization: $SERVICE_TOKEN" \
            "$PB_BASE_URL/api/collections/ai_provider_keys/records?page=1&perPage=1&fields=id" \
            | jq -e 'has("totalItems")' > /dev/null

          DENIED_STATUS=$(curl --connect-timeout 10 --max-time 30 -sS \
            -o /tmp/narrow-schema-response.json -w '%{http_code}' \
            -H "Authorization: $SERVICE_TOKEN" \
            "$PB_BASE_URL/api/collections")
          if [ "$DENIED_STATUS" != "403" ]; then
            echo "::error::Narrow identity unexpectedly reached the collections administration API (HTTP $DENIED_STATUS)."
            exit 1
          fi
          echo "SERVICE_PROVISIONED=1" >> "$GITHUB_ENV"

      - name: Pull and build the production project
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_POCKETBASE_URL: ${{ vars.VITE_POCKETBASE_URL || 'https://ltv-desking-pro-api.fly.dev' }}
          VITE_POSTHOG_KEY: ${{ secrets.VITE_POSTHOG_KEY || '' }}
        run: |
          set -euo pipefail
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          VITE_RELEASE="$RELEASE_SHA" vercel build --prod --token="$VERCEL_TOKEN"

      - name: Set the narrow Vercel production credentials
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          echo "PROJECT_ENV_UPDATED=1" >> "$GITHUB_ENV"
          printf '%s' "$PB_BASE_URL" \
            | vercel env add PB_INTERNAL_URL production --force --yes --token="$VERCEL_TOKEN"
          printf '%s' "$PB_SERVICE_COLLECTION" \
            | vercel env add PB_SERVICE_COLLECTION production --force --yes --no-sensitive --token="$VERCEL_TOKEN"
          printf '%s' "$NEW_SERVICE_EMAIL" \
            | vercel env add PB_SERVICE_EMAIL production --force --yes --sensitive --token="$VERCEL_TOKEN"
          printf '%s' "$NEW_SERVICE_PASSWORD" \
            | vercel env add PB_SERVICE_PASSWORD production --force --yes --sensitive --token="$VERCEL_TOKEN"

      - name: Stage Vercel from the saved narrow credentials
        id: stage
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          DEPLOYMENT_URL=$(vercel deploy --prebuilt --prod --skip-domain --token="$VERCEL_TOKEN")
          case "$DEPLOYMENT_URL" in
            https://*.vercel.app) ;;
            *)
              echo "::error::Vercel returned an unexpected deployment URL."
              exit 1
              ;;
          esac
          echo "deployment_url=$DEPLOYMENT_URL" >> "$GITHUB_OUTPUT"
          vercel inspect "$DEPLOYMENT_URL" --wait --timeout=10m --token="$VERCEL_TOKEN"

      - name: Verify the staged Vercel AI API reads PB keys
        env:
          DEPLOYMENT_URL: ${{ steps.stage.outputs.deployment_url }}
        run: |
          set -euo pipefail
          curl --retry 8 --retry-delay 5 --retry-all-errors \
            --connect-timeout 10 --max-time 30 -fsS "$DEPLOYMENT_URL/" > /dev/null
          MODELS=$(curl --retry 8 --retry-delay 5 --retry-all-errors \
            --connect-timeout 10 --max-time 30 -fsS "$DEPLOYMENT_URL/api/ai/models")
          printf '%s' "$MODELS" | jq -c '
            [.providers[] | select(.configured == true) | .id] | sort
          ' > /tmp/staged-configured-providers.json
          if ! cmp -s /tmp/expected-configured-providers.json /tmp/staged-configured-providers.json; then
            echo "::error::Staged AI API did not report the provider keys available through the narrow identity."
            echo "Expected provider IDs: $(cat /tmp/expected-configured-providers.json)"
            echo "Actual provider IDs: $(cat /tmp/staged-configured-providers.json)"
            exit 1
          fi

      - name: Promote and verify the production alias
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          DEPLOYMENT_URL: ${{ steps.stage.outputs.deployment_url }}
        run: |
          set -euo pipefail
          vercel promote "$DEPLOYMENT_URL" --yes --token="$VERCEL_TOKEN"
          echo "ROTATION_PROMOTED=1" >> "$GITHUB_ENV"

          DEPLOYMENT_HOST=${DEPLOYMENT_URL#https://}
          PRODUCTION_URL=${PRODUCTION_URL%/}
          PRODUCTION_HOST=${PRODUCTION_URL#https://}
          PRODUCTION_HOST=${PRODUCTION_HOST%%/*}
          STAGED_ID=$(curl -fsS \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v13/deployments/$DEPLOYMENT_HOST?teamId=$VERCEL_ORG_ID" \
            | jq -r '.id // empty')
          if [ -z "$STAGED_ID" ]; then
            echo "::error::Unable to resolve the staged Vercel deployment ID."
            exit 1
          fi

          ALIAS_ID=""
          for attempt in $(seq 1 12); do
            ALIAS_ID=$(curl -fsS \
              -H "Authorization: Bearer $VERCEL_TOKEN" \
              "https://api.vercel.com/v13/deployments/$PRODUCTION_HOST?teamId=$VERCEL_ORG_ID" \
              | jq -r '.id // empty')
            if [ "$ALIAS_ID" = "$STAGED_ID" ]; then
              break
            fi
            echo "Alias has not converged on attempt $attempt."
            sleep 5
          done
          if [ "$ALIAS_ID" != "$STAGED_ID" ]; then
            echo "::error::Production alias does not resolve to the promoted deployment."
            exit 1
          fi

          MODELS=$(curl --retry 8 --retry-delay 5 --retry-all-errors \
            --connect-timeout 10 --max-time 30 -fsS "$PRODUCTION_URL/api/ai/models")
          printf '%s' "$MODELS" | jq -c '
            [.providers[] | select(.configured == true) | .id] | sort
          ' > /tmp/production-configured-providers.json
          if ! cmp -s /tmp/expected-configured-providers.json /tmp/production-configured-providers.json; then
            echo "::error::Production AI API did not retain narrow provider-key access after promotion."
            exit 1
          fi

      - name: Retire previous ai_proxy identities
        run: |
          set -euo pipefail
          BOOTSTRAP_TOKEN=$(cat /tmp/pb-bootstrap-token)
          while IFS= read -r record_id; do
            if [ -n "$record_id" ]; then
              curl --connect-timeout 10 --max-time 30 --fail-with-body -sS \
                -X DELETE \
                -H "Authorization: $BOOTSTRAP_TOKEN" \
                "$PB_BASE_URL/api/collections/$PB_SERVICE_COLLECTION/records/$record_id"
            fi
          done < /tmp/old-service-account-ids

          REMAINING=$(curl --retry 5 --retry-delay 2 --retry-all-errors \
            --connect-timeout 10 --max-time 30 --fail-with-body -sS \
            -H "Authorization: $BOOTSTRAP_TOKEN" \
            "$PB_BASE_URL/api/collections/$PB_SERVICE_COLLECTION/records?page=1&perPage=200")
          printf '%s' "$REMAINING" | jq -e \
            --arg id "$NEW_SERVICE_ID" --arg scope "$PB_SERVICE_SCOPE" '
              [.items[] | select(.scope == $scope) | .id] == [$id]
            ' > /dev/null
          echo "ROTATION_COMMITTED=1" >> "$GITHUB_ENV"

      - name: Remove uncommitted narrow identity
        if: always()
        run: |
          set -euo pipefail
          if [ "${ROTATION_COMMITTED:-0}" = "1" ] || \
             [ "${PROJECT_ENV_UPDATED:-0}" = "1" ] || \
             [ "${ROTATION_PROMOTED:-0}" = "1" ]; then
            exit 0
          fi
          if [ -n "${NEW_SERVICE_ID:-}" ] && [ -s /tmp/pb-bootstrap-token ]; then
            BOOTSTRAP_TOKEN=$(cat /tmp/pb-bootstrap-token)
            curl --connect-timeout 10 --max-time 30 --fail-with-body -sS \
              -X DELETE \
              -H "Authorization: $BOOTSTRAP_TOKEN" \
              "$PB_BASE_URL/api/collections/$PB_SERVICE_COLLECTION/records/$NEW_SERVICE_ID"
          fi

      - name: Delete temporary bootstrap superuser
        if: always()
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          set -euo pipefail
          if [ ! -e /tmp/pb-bootstrap-attempted ]; then
            exit 0
          fi
          BOOTSTRAP_EMAIL=$(cat /tmp/pb-bootstrap-email)
          BOOTSTRAP_PASSWORD=$(cat /tmp/pb-bootstrap-password)
          AUTH_BODY=$(jq -nc \
            --arg identity "$BOOTSTRAP_EMAIL" \
            --arg password "$BOOTSTRAP_PASSWORD" \
            '{identity:$identity,password:$password}')

          BOOTSTRAP_GONE=0
          for attempt in $(seq 1 5); do
            flyctl ssh console --app "$FLY_APP" --command \
              "/pb/pocketbase superuser delete '$BOOTSTRAP_EMAIL' --automigrate=false --dir=/pb/pb_data --hooksWatch=false" || true
            AUTH_STATUS=$(curl --connect-timeout 10 --max-time 30 -sS \
              -o /tmp/pb-bootstrap-auth-response -w '%{http_code}' \
              -H 'Content-Type: application/json' \
              --data "$AUTH_BODY" \
              "$PB_BASE_URL/api/collections/_superusers/auth-with-password" || true)
            case "$AUTH_STATUS" in
              400|401|404)
                BOOTSTRAP_GONE=1
                break
                ;;
              200)
                echo "Bootstrap superuser still authenticates after cleanup attempt $attempt."
                ;;
              *)
                echo "Could not verify bootstrap cleanup on attempt $attempt (HTTP ${AUTH_STATUS:-000})."
                ;;
            esac
            sleep 5
          done
          if [ "$BOOTSTRAP_GONE" != "1" ]; then
            echo "::error::Temporary bootstrap superuser could not be proven deleted."
            exit 1
          fi

      - name: Remove runner credential material
        if: always()
        run: rm -rf .vercel /tmp/old-service-account-ids /tmp/*configured-providers.json /tmp/ai-provider-keys-collection.json /tmp/narrow-schema-response.json /tmp/pb-bootstrap-*
