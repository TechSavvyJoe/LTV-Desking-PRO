name: PR Check

on:
  pull_request:
    branches: [main]
  push:
    branches-ignore: [main]

permissions:
  contents: read

concurrency:
  group: check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test -- --run

      - name: Build (verify it compiles)
        run: npm run build
        env:
          VITE_POCKETBASE_URL: https://example.invalid
          # Matches deploy-vercel; empty is fine (analytics no-ops)
          VITE_POSTHOG_KEY: ""

      - name: Audit
        run: npm audit --audit-level=moderate

      - name: Attempt safe npm audit fix (report only; never mutates in CI)
        run: npm audit fix --dry-run --audit-level=moderate || true

      - name: Test (with coverage)
        run: npm run test:coverage
        continue-on-error: true

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: vitest-coverage
          path: coverage/
          retention-days: 30
        # continue even if coverage thresholds cause non-zero (we still want artifact)

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      # ----------------------------------------------------------------------
      # E2E with real backend via seed helper (reliable full-stack integration)
      # - Download/ensure linux PB binary (seed helper handles)
      # - Run seed helper with KEEP + REAL flags: starts PB on 8090 + seeds dealers/users/inv/lenders/settings
      # - Start Vite dev server (with VITE_POCKETBASE_URL) in background
      # - Run playwright (config detects E2E_REAL_BACKEND and disables webServer + mocks)
      # - This exercises load desk, inventory import, AI upload, save deal, lender matching, PDF against seeded data.
      # ----------------------------------------------------------------------
      - name: Prepare seeded backend for E2E (use seed helper)
        if: github.event_name == 'pull_request'
        timeout-minutes: 6
        run: |
          # Ensure clean data dir for CI
          mkdir -p backend/pb_data
          rm -f backend/pb_data/data.db backend/pb_data/data.db-wal backend/pb_data/data.db-shm || true
          # Invoke seed helper (it will download PB linux, run migrations, superuser, spawn serve + seedData, leave running)
          E2E_REAL_BACKEND=1 E2E_KEEP_PB_RUNNING=1 npx tsx tests/helpers/seed-test-db.ts
        env:
          PB_VERSION: "0.26.5"

      - name: Start frontend dev server (for E2E, pointed at seeded PB)
        if: github.event_name == 'pull_request'
        run: |
          VITE_POCKETBASE_URL=http://127.0.0.1:8090 npm run dev &
          # Wait for vite to be ready (playwright config also checks but explicit here)
          for i in {1..30}; do curl -sf http://127.0.0.1:3000 && break || sleep 2; done
          curl -sf http://127.0.0.1:3000 || (echo "Dev server failed to start"; exit 1)

      - name: Run E2E tests (real backend via seed helper)
        if: github.event_name == 'pull_request'
        run: E2E_REAL_BACKEND=1 VITE_POCKETBASE_URL=http://127.0.0.1:8090 npm run test:e2e
        env:
          E2E_REAL_BACKEND: "1"
          VITE_POCKETBASE_URL: "http://127.0.0.1:8090"

      - name: Upload E2E report (on failure or always for review)
        if: always() && github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Teardown PB (if still running from seed helper)
        if: always()
        run: pkill -f pocketbase || true

      # Note: e2e now uses seed helper (tests/helpers/seed-test-db.ts) + real PB for reliable integration testing of all key flows.
      # Mocks still supported for local `npm run test:e2e` (fast hermetic). playwright.config.ts + specs auto-detect via E2E_REAL_BACKEND.
      # Dev server + PB started explicitly here for control (webServer disabled in config when real).
      # Coverage: vitest v8 + thresholds in vitest.config.ts; artifacts for both.
      # See updated playwright.config.ts, tests/e2e/auth.spec.ts, seed-test-db.ts.
      # For local real: E2E_KEEP_PB_RUNNING=1 E2E_REAL_BACKEND=1 node tests/helpers/seed-test-db.ts ; VITE_POCKETBASE_URL=http://127.0.0.1:8090 npm run dev ; E2E_REAL_BACKEND=1 npm run test:e2e
