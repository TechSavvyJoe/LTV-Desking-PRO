# Litestream config — continuous LTX replication of PocketBase's SQLite DB
# to a Cloudflare R2 bucket. Recovery point objective: seconds.
#
# Required Fly secrets (set via `fly secrets set …`):
#   LITESTREAM_ACCESS_KEY_ID       R2 access key id
#   LITESTREAM_SECRET_ACCESS_KEY   R2 secret
#   LITESTREAM_BUCKET              R2 bucket name (e.g. ltv-desking-pro-backups)
#   LITESTREAM_ENDPOINT            R2 S3-compatible endpoint
#                                  (e.g. https://<accountid>.r2.cloudflarestorage.com)
#
# The container's start.sh wraps PocketBase with `litestream replicate -exec`
# so a failed replicator cannot leave an apparently healthy, unprotected API.

# Preserve 14 days of point-in-time recovery with daily full snapshots and
# hourly/daily LTX compaction. Validation catches remote gaps before a restore.
snapshot:
  interval: 24h
  retention: 336h

levels:
  - interval: 1h
    retention: 24h
  - interval: 24h
    retention: 336h

validation:
  interval: 6h

dbs:
  - path: /pb/pb_data/data.db
    replica:
      type: s3
      bucket: ${LITESTREAM_BUCKET}
      path: data.db
      endpoint: ${LITESTREAM_ENDPOINT}
      region: auto
      access-key-id: ${LITESTREAM_ACCESS_KEY_ID}
      secret-access-key: ${LITESTREAM_SECRET_ACCESS_KEY}
      sync-interval: 10s
